name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages.
# Runs on pushes to the default branch, and can be triggered manually.
# One-time setup in the repo: Settings → Pages → Build and deployment →
# Source = "GitHub Actions".
on:
  push:
    # Includes the current default branch so the Pages environment (which only
    # allows deploys from the default branch) accepts the deployment. Once main
    # is made the default, [main] alone is enough.
    branches: [main, claude/portfolio-site-frame-fmhpg5]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
