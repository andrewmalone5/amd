      <rect width="100" height="100" fill="#fff"/>
      <path d="M2 67 C16 60 32 60 48 67 C64 74 80 74 98 67" fill="none" stroke="#000"
            stroke-width="9" stroke-linecap="round"/>
    </mask>
  </defs>
  <circle cx="50" cy="48" r="38" fill="#1C1A17" mask="url(#wave)"/>
</svg>
