<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 19 Breakout — the solid peak bursts through the keyline circle, wave riding inside -->
  <defs>
    <mask id="ring-gap">
      <rect width="100" height="100" fill="#fff"/>
      <path d="M26 82 L50 14 L74 82 Z" fill="#000" stroke="#000" stroke-width="8"
            stroke-linejoin="round"/>
    </mask>
    <mask id="wave-cut">
      <rect width="100" height="100" fill="#fff"/>
      <path d="M34 72 C39 67 45 67 50 72 C55 77 61 77 66 72" fill="none" stroke="#000"
            stroke-width="7" stroke-linecap="round"/>
    </mask>
  </defs>
  <circle cx="50" cy="56" r="36" fill="none" stroke="#1C1A17" stroke-width="7"
          mask="url(#ring-gap)"/>
  <path d="M26 82 L50 14 L74 82 Z" fill="#1C1A17" mask="url(#wave-cut)"/>
</svg>
