<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 22 Orbit — the circle becomes an orbit ring passing behind the solid peak -->
  <defs>
    <mask id="ring-gap">
      <rect width="100" height="100" fill="#fff"/>
      <path d="M30 80 L50 20 L70 80 Z" fill="#000" stroke="#000" stroke-width="8"
            stroke-linejoin="round"/>
    </mask>
  </defs>
  <g mask="url(#ring-gap)">
    <ellipse cx="50" cy="60" rx="42" ry="14" fill="none" stroke="#1C1A17"
             stroke-width="7" transform="rotate(-18 50 60)"/>
  </g>
  <path d="M30 80 L50 20 L70 80 Z" fill="#1C1A17"/>
</svg>
