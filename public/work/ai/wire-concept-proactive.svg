<svg xmlns="http://www.w3.org/2000/svg" width="460" height="740" viewBox="0 0 460 740" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Wireframe of the proactive assistant: the panel opens with a suggestion grounded in the seller's sales data, an explicit accept-or-reject step, and follow-up branches the seller chooses.">
  <rect width="460" height="740" fill="#FFFFFF"/>
  <rect x="20" y="20" width="420" height="700" rx="14" fill="#FFFFFF" stroke="#C9C9C9" stroke-width="1.5"/>

  <!-- header -->
  <text x="44" y="56" font-size="14" font-weight="bold" fill="#2B2B2B">Assistant</text>
  <text x="416" y="56" font-size="13" fill="#8A8A8A" text-anchor="end">✕</text>
  <line x1="21" y1="72" x2="439" y2="72" stroke="#E4E4E4"/>

  <!-- proactive suggestion card -->
  <rect x="40" y="92" width="380" height="304" rx="12" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="58" y="110" width="196" height="18" rx="9" fill="#F0F0F0"/>
  <text x="68" y="122" font-size="8.5" letter-spacing="1" fill="#6A6A6A">SUGGESTION · FROM YOUR SALES DATA</text>

  <text x="58" y="156" font-size="15" font-weight="bold" fill="#2B2B2B">Revenue dipped 8% this week</text>
  <text x="58" y="180" font-size="11" fill="#4A4A4A">Two of your iPhone 13 listings went offline on</text>
  <text x="58" y="196" font-size="11" fill="#4A4A4A">Friday, and they were your best sellers.</text>
  <text x="58" y="212" font-size="11" fill="#4A4A4A">Want me to relist them?</text>
  <text x="58" y="238" font-size="9.5" fill="#9A9A9A">Why this? Both listings still have stock and passed quality checks.</text>

  <line x1="58" y1="256" x2="402" y2="256" stroke="#E4E4E4"/>

  <text x="58" y="280" font-size="8.5" letter-spacing="1.5" fill="#9A9A9A">YOU DECIDE</text>
  <rect x="58" y="292" width="110" height="36" rx="18" fill="#3A3A3A"/>
  <text x="113" y="315" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Relist both</text>
  <rect x="178" y="292" width="122" height="36" rx="18" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="239" y="315" font-size="11" font-weight="bold" fill="#2B2B2B" text-anchor="middle">Show me first</text>

  <text x="58" y="360" font-size="9.5" fill="#6A6A6A" font-weight="bold">Nothing happens without you.</text>
  <text x="58" y="374" font-size="9.5" fill="#9A9A9A">The assistant suggests; you decide.</text>

  <!-- follow-up branches -->
  <text x="44" y="428" font-size="9" letter-spacing="1" fill="#B4B4B4">FOLLOW-UPS, CHOSEN BY THE SELLER</text>
  <rect x="44" y="440" width="110" height="30" rx="15" fill="#FFFFFF" stroke="#D0D0D0"/>
  <text x="99" y="459" font-size="10" fill="#4A4A4A" text-anchor="middle">What changed?</text>
  <rect x="162" y="440" width="112" height="30" rx="15" fill="#FFFFFF" stroke="#D0D0D0"/>
  <text x="218" y="459" font-size="10" fill="#4A4A4A" text-anchor="middle">Payout impact</text>
  <rect x="282" y="440" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#D0D0D0"/>
  <text x="320" y="459" font-size="10" fill="#4A4A4A" text-anchor="middle">Dismiss</text>

  <!-- input -->
  <line x1="21" y1="656" x2="439" y2="656" stroke="#E4E4E4"/>
  <rect x="40" y="670" width="330" height="36" rx="18" fill="#FFFFFF" stroke="#C9C9C9"/>
  <text x="56" y="692" font-size="11" fill="#A8A8A8">Or ask anything…</text>
  <rect x="380" y="670" width="40" height="36" rx="10" fill="#3A3A3A"/>
  <path d="M394 692 L408 688 L394 684 L397 688 Z" fill="#FFFFFF"/>
</svg>
