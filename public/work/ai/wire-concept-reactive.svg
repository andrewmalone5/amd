<svg xmlns="http://www.w3.org/2000/svg" width="460" height="740" viewBox="0 0 460 740" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Wireframe of the reactive assistant: a chat panel where the seller asks a question and receives an answer sourced from a support-centre article.">
  <rect width="460" height="740" fill="#FFFFFF"/>
  <rect x="20" y="20" width="420" height="700" rx="14" fill="#FFFFFF" stroke="#C9C9C9" stroke-width="1.5"/>

  <!-- header -->
  <text x="44" y="56" font-size="14" font-weight="bold" fill="#2B2B2B">Assistant</text>
  <rect x="120" y="42" width="40" height="18" rx="9" fill="#F0F0F0"/>
  <text x="140" y="54" font-size="9" fill="#8A8A8A" text-anchor="middle">BETA</text>
  <text x="416" y="56" font-size="13" fill="#8A8A8A" text-anchor="end">✕</text>
  <line x1="21" y1="72" x2="439" y2="72" stroke="#E4E4E4"/>

  <text x="230" y="104" font-size="10" fill="#B4B4B4" text-anchor="middle">Today, 14:02</text>

  <!-- user bubble -->
  <rect x="176" y="120" width="240" height="42" rx="12" fill="#3A3A3A"/>
  <text x="296" y="146" font-size="11" fill="#FFFFFF" text-anchor="middle">Why was my payout lower this week?</text>

  <!-- assistant bubble -->
  <rect x="44" y="182" width="310" height="150" rx="12" fill="#F2F2F2"/>
  <text x="60" y="208" font-size="11" fill="#2B2B2B">Your payout includes a €54 deduction for a</text>
  <text x="60" y="224" font-size="11" fill="#2B2B2B">refund processed on 14 July.</text>
  <rect x="60" y="238" width="262" height="8" rx="4" fill="#DCDCDC"/>
  <rect x="60" y="254" width="238" height="8" rx="4" fill="#DCDCDC"/>
  <rect x="60" y="270" width="250" height="8" rx="4" fill="#DCDCDC"/>
  <rect x="60" y="286" width="180" height="8" rx="4" fill="#DCDCDC"/>
  <text x="60" y="318" font-size="9" fill="#9A9A9A">Answered from the support centre</text>

  <!-- source card -->
  <rect x="44" y="348" width="310" height="56" rx="10" fill="#FFFFFF" stroke="#D0D0D0"/>
  <rect x="58" y="362" width="28" height="28" rx="6" fill="#EDEDED"/>
  <line x1="64" y1="371" x2="80" y2="371" stroke="#B8B8B8" stroke-width="1.5"/>
  <line x1="64" y1="377" x2="80" y2="377" stroke="#B8B8B8" stroke-width="1.5"/>
  <line x1="64" y1="383" x2="74" y2="383" stroke="#B8B8B8" stroke-width="1.5"/>
  <text x="98" y="374" font-size="10" font-weight="bold" fill="#2B2B2B">Payout schedule &amp; deductions</text>
  <text x="98" y="390" font-size="9" fill="#8A8A8A">Support centre · Open article →</text>

  <!-- feedback -->
  <text x="44" y="442" font-size="10" fill="#8A8A8A">Was this helpful?</text>
  <rect x="132" y="426" width="28" height="24" rx="6" fill="#FFFFFF" stroke="#D0D0D0"/>
  <text x="146" y="442" font-size="10" text-anchor="middle" fill="#6A6A6A">👍</text>
  <rect x="168" y="426" width="28" height="24" rx="6" fill="#FFFFFF" stroke="#D0D0D0"/>
  <text x="182" y="442" font-size="10" text-anchor="middle" fill="#6A6A6A">👎</text>

  <!-- input -->
  <line x1="21" y1="656" x2="439" y2="656" stroke="#E4E4E4"/>
  <rect x="40" y="670" width="330" height="36" rx="18" fill="#FFFFFF" stroke="#C9C9C9"/>
  <text x="56" y="692" font-size="11" fill="#A8A8A8">Ask a question…</text>
  <rect x="380" y="670" width="40" height="36" rx="10" fill="#3A3A3A"/>
  <path d="M394 692 L408 688 L394 684 L397 688 Z" fill="#FFFFFF"/>
</svg>
