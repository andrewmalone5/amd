<svg xmlns="http://www.w3.org/2000/svg" width="920" height="740" viewBox="0 0 920 740" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Wireframe of the chatbot entry before industrialization: the assistant sits behind a locked tab inside the Help section, a full-screen legal disclaimer blocks the conversation, and the message input is disabled.">
  <rect width="920" height="740" fill="#FFFFFF"/>
  <rect x="20" y="20" width="880" height="700" rx="10" fill="#FFFFFF" stroke="#C9C9C9" stroke-width="1.5"/>

  <!-- top bar -->
  <rect x="21" y="21" width="878" height="48" rx="9" fill="#FAFAFA"/>
  <line x1="21" y1="69" x2="899" y2="69" stroke="#E4E4E4"/>
  <circle cx="52" cy="45" r="10" fill="#3A3A3A"/>
  <rect x="76" y="39" width="70" height="12" rx="6" fill="#DCDCDC"/>
  <rect x="740" y="37" width="60" height="16" rx="8" fill="#EDEDED"/>
  <circle cx="864" cy="45" r="12" fill="#EDEDED"/>

  <!-- sidebar -->
  <rect x="21" y="69" width="180" height="650" fill="#FAFAFA"/>
  <line x1="201" y1="69" x2="201" y2="719" stroke="#E4E4E4"/>
  <rect x="40" y="98" width="110" height="10" rx="5" fill="#DCDCDC"/>
  <rect x="40" y="132" width="130" height="10" rx="5" fill="#DCDCDC"/>
  <rect x="40" y="166" width="96" height="10" rx="5" fill="#DCDCDC"/>
  <rect x="40" y="200" width="120" height="10" rx="5" fill="#DCDCDC"/>
  <rect x="40" y="234" width="88" height="10" rx="5" fill="#DCDCDC"/>
  <rect x="32" y="260" width="158" height="28" rx="6" fill="#EDEDED"/>
  <text x="40" y="279" font-size="11" font-weight="bold" fill="#2B2B2B">Help</text>

  <!-- content -->
  <text x="240" y="116" font-size="18" font-weight="bold" fill="#2B2B2B">Help &amp; contact</text>

  <!-- tabs -->
  <text x="240" y="164" font-size="12" fill="#8A8A8A">Contact us</text>
  <text x="340" y="164" font-size="12" fill="#8A8A8A">Articles</text>
  <text x="424" y="164" font-size="12" font-weight="bold" fill="#2B2B2B">Chat assistant</text>
  <rect x="528" y="152" width="12" height="9" rx="2" fill="none" stroke="#8A8A8A" stroke-width="1.5"/>
  <path d="M530.5 152 v-3 a3.5 3.5 0 0 1 7 0 v3" fill="none" stroke="#8A8A8A" stroke-width="1.5"/>
  <line x1="424" y1="176" x2="546" y2="176" stroke="#2B2B2B" stroke-width="2"/>
  <line x1="240" y1="177" x2="880" y2="177" stroke="#E4E4E4"/>

  <!-- disclaimer wall -->
  <rect x="272" y="216" width="560" height="330" rx="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1.5"/>
  <text x="300" y="256" font-size="14" font-weight="bold" fill="#2B2B2B">Before you start</text>
  <text x="300" y="278" font-size="10" fill="#8A8A8A">Please read and accept the conditions below to use the chat assistant.</text>
  <rect x="300" y="298" width="504" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="316" width="480" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="334" width="496" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="352" width="452" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="370" width="488" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="388" width="360" height="8" rx="4" fill="#E6E6E6"/>
  <rect x="300" y="422" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#B4B4B4" stroke-width="1.5"/>
  <text x="328" y="434" font-size="11" fill="#4A4A4A">I have read and accept the AI assistant disclaimer</text>
  <rect x="300" y="464" width="120" height="38" rx="19" fill="#E8E8E8"/>
  <text x="360" y="488" font-size="11" font-weight="bold" fill="#ABABAB" text-anchor="middle">Start chat</text>

  <!-- disabled input -->
  <rect x="272" y="576" width="500" height="40" rx="20" fill="#FAFAFA" stroke="#D8D8D8" stroke-dasharray="4 4"/>
  <text x="292" y="600" font-size="11" fill="#C0C0C0">Message…</text>
  <rect x="784" y="576" width="48" height="40" rx="12" fill="#EDEDED"/>
  <path d="M802 600 L816 596 L802 592 L805 596 Z" fill="#B4B4B4"/>
</svg>
